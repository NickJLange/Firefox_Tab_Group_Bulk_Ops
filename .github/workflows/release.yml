name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: AMO_API_KEY
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build XPI
        run: make build
      
      - name: Create and Upload Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} --generate-notes --title "Release ${{ github.ref_name }}" || echo "Release already exists"
          gh release upload ${{ github.ref_name }} group-same-site-tabs.xpi --clobber

      - name: Sign and submit to AMO
        env:
          AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        run: |
          npx web-ext sign \
            --api-key="$AMO_API_KEY" \
            --api-secret="$AMO_API_SECRET" \
            --channel listed \
            --source-dir . \
            --ignore-files "Makefile" "PUBLISHING.md" "AGENTS.md" "extension.zip" "*.xpi" ".git/**" ".github/**" ".claude/**" "Firefox_Tab_Group_Bulk_Ops.code-workspace"
